defaults:
  - /base

training:
  strategy: lora                # lora | qlora | full
  output_dir: ${paths.output_dir}/lora_decoder
  num_train_epochs: 10
  max_steps: -1                 # -1 = use num_train_epochs
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-4
  weight_decay: 0.0
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  max_grad_norm: 1.0
  # Mixed precision (bf16 preferred on Ampere+; fall back to fp16 otherwise)
  bf16: false
  fp16: true
  optim: adamw_torch
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  group_by_length: true
  length_column_name: input_length
  predict_with_generate: true
  generation_max_length: 225
  generation_num_beams: 1       # greedy during validation for speed
  evaluation_strategy: steps
  eval_steps: 200
  save_strategy: steps
  save_steps: 200
  save_total_limit: 3
  logging_steps: 25
  load_best_model_at_end: true
  metric_for_best_model: wer
  greater_is_better: false
  early_stopping:
    enabled: true
    patience: 4
    threshold: 0.001
  report_to: [mlflow, tensorboard]
  remove_unused_columns: true
  label_names: [labels]
  resume_from_checkpoint: null

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  # Apply to the decoder cross-attention and self-attention projection layers only
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - out_proj
  # Module-name filter restricts adapters to the decoder
  modules_to_save: []
  task_type: SEQ_2_SEQ_LM
  apply_to_encoder: false
  apply_to_decoder: true