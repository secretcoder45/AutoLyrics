services:
  # ---------- API (CPU) ----------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: autolyrics:latest
    container_name: autolyrics-api
    command: >
      uvicorn autolyrics.api.main:app
      --host 0.0.0.0 --port 8000 --workers 1
    environment:
      - AUTOLYRICS_LOG_LEVEL=INFO
      - AUTOLYRICS_DEVICE=cpu
      - AUTOLYRICS_API_DEFAULT_MODEL=openai/whisper-tiny
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - HF_HOME=/app/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./runs:/app/runs
      - hf-cache:/app/.cache/huggingface
    depends_on:
      - mlflow
    restart: unless-stopped

  # ---------- Gradio demo ----------
  demo:
    build:
      context: .
      dockerfile: Dockerfile
    image: autolyrics:latest
    container_name: autolyrics-demo
    command: python -m autolyrics.ui.gradio_app
    environment:
      - AUTOLYRICS_LOG_LEVEL=INFO
      - AUTOLYRICS_DEVICE=cpu
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - HF_HOME=/app/.cache/huggingface
    ports:
      - "7860:7860"
    volumes:
      - ./data:/app/data
      - ./runs:/app/runs
      - hf-cache:/app/.cache/huggingface
    restart: unless-stopped

  # ---------- MLflow tracking server ----------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: autolyrics-mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    restart: unless-stopped

  # ---------- API (GPU, optional profile) ----------
  api-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE: nvidia/cuda:12.1.0-runtime-ubuntu22.04
    image: autolyrics:cuda
    container_name: autolyrics-api-gpu
    command: >
      uvicorn autolyrics.api.main:app
      --host 0.0.0.0 --port 8000 --workers 1
    environment:
      - AUTOLYRICS_DEVICE=cuda
      - AUTOLYRICS_API_DEFAULT_MODEL=openai/whisper-small
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - HF_HOME=/app/.cache/huggingface
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
      - ./runs:/app/runs
      - hf-cache:/app/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - mlflow
    restart: unless-stopped

volumes:
  hf-cache: {}
  mlflow-data: {}